name: CI Cairo

on:
  push:
    branches: [main]
    paths:
      - "**/*.cairo"
      - "**/Scarb.toml"
      - "**/Scarb.lock"
  pull_request:
    paths:
      - "**/*.cairo"
      - "**/Scarb.toml"
      - "**/Scarb.lock"

env:
  SCARB_VERSION: "2.13.1"
  DOJO_VERSION: "1.8.5"

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: ${{ env.SCARB_VERSION }}

      - name: Format check
        run: scarb fmt --check

  build:
    needs: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: ${{ env.SCARB_VERSION }}

      - name: Install Dojo
        run: |
          curl -L "https://github.com/dojoengine/dojo/releases/download/sozo%2Fv${DOJO_VERSION}/sozo_v${DOJO_VERSION}_linux_amd64.tar.gz" -o /tmp/sozo.tar.gz
          tar -xzf /tmp/sozo.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/sozo
          sozo --version

      - name: Build
        run: sozo build

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: ${{ env.SCARB_VERSION }}

      - name: Install Dojo
        run: |
          curl -L "https://github.com/dojoengine/dojo/releases/download/sozo%2Fv${DOJO_VERSION}/sozo_v${DOJO_VERSION}_linux_amd64.tar.gz" -o /tmp/sozo.tar.gz
          tar -xzf /tmp/sozo.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/sozo
          sozo --version

      - name: Test
        run: scarb test
