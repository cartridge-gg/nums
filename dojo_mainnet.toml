[world]
name = "Nums"
seed = "nums-v1.0.17"
description = "On chain version of the Number Challenge or Blind Number Challenge game."
website = "https://nums.gg"

[namespace]
default = "NUMS"

[env]
rpc_url = "https://api.cartridge.gg/x/starknet/mainnet"
# world_address = "0x06bba2fea5c315483d0a698e21c29aa2c305e53aae4da39f16e8215845dc0848"
account_address = "0x041aad5a7493b75f240f418cb5f052d1a68981af21e813ed0a35e96d3e83123b"
keystore_path = "./keystore_sepolia.json"

[migration]
order_inits = [
  "NUMS-Token",
  "NUMS-Setup",
  "NUMS-Play",
  "NUMS-Collection",
  "NUMS-Vault",
  "NUMS-Faucet",
  "NUMS-Team",
]
skip_contracts = ["NUMS-Vrf", "NUMS-Registry"]
disable_multicall = true

[writers]
"NUMS" = ["NUMS-Setup", "NUMS-Play"]

[owners]
"NUMS" = ["NUMS-Collection", "NUMS-Vault", "NUMS-Faucet", "NUMS-Token"]

[init_call_args]
"NUMS-Vault" = [
  "0x1",   # open: true
  "0x1F4", # fee: 500 basis points (10000 basis points = 100%)
]
"NUMS-Governor" = []
"NUMS-Treasury" = [
  "0xe10",                                                              # min_delay: 1 hour
  "0x041aad5a7493b75f240f418cb5f052d1a68981af21e813ed0a35e96d3e83123b", # Admin address
]
"NUMS-Token" = [
  "0xD3C21BCECCEDA1000000",                                             # initial_supply: 1.0M NUMS
  "0x041aad5a7493b75f240f418cb5f052d1a68981af21e813ed0a35e96d3e83123b", # recipient
]
"NUMS-Faucet" = [
  "0x2540BE400",                                                        # initial_supply: 10K USDC
  "0x041aad5a7493b75f240f418cb5f052d1a68981af21e813ed0a35e96d3e83123b", # recipient
]
"NUMS-Setup" = [
  "0x0",                                                                # Option::Some
  "0x051fea4450da9d6aee758bdeba88b2f665bcbf549d2c61421aa724e9ac0ced8f", # vrf_address
  "0x1",                                                                # quote_address: None
