[world]
name = "Nums"
seed = "nums-v1.0.45"
description = "On chain version of the Number Challenge or Blind Number Challenge game."
website = "https://nums.gg"

[namespace]
default = "NUMS"

[env]
rpc_url = "https://api.cartridge.gg/x/starknet/sepolia"
# world_address = "0x00b74e7ee80e506fcec7893cdc0aadacc616ddc4dbdeece10b79acff90ff0862"
account_address = "0x059b1a0c489b635d7c7f43594d187362ddd2dcea6c82db4eef2579fd185b3753"
keystore_path = "./keystore_sepolia.json"

[migration]
order_inits = [
  "NUMS-Token",
  "NUMS-Setup",
  "NUMS-Play",
  "NUMS-Collection",
  "NUMS-Vault",
]
skip_contracts = ["NUMS-Vrf", "NUMS-Registry"]
disable_multicall = true

[writers]
"NUMS" = ["NUMS-Play", "NUMS-Vault"]

[owners]
"NUMS" = ["NUMS-Setup", "NUMS-Collection"]

[init_call_args]
"NUMS-Vault" = [
  "0x1", # open: true
]
"NUMS-Token" = [
  "0x6342FD08F00F6378000000", # initial_supply: 120K NUMS
]
"NUMS-Setup" = [
  "0x1",                                                                # nums_address: Option::None
  "0x0",                                                                # Option::Some
  "0x051fea4450da9d6aee758bdeba88b2f665bcbf549d2c61421aa724e9ac0ced8f", # vrf_address
  "0x0",                                                                # Option::Some
  "0x03eb03b8f2be0ec2aafd186d72f6d8f3dd320dbc89f2b6802bca7465f6ccaa43", # starterpack_address
  "0x1",                                                                # vault_address: Option::None
