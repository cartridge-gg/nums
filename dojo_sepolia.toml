[world]
name = "Nums"
seed = "nums-v1.0.58"
description = "On chain version of the Number Challenge or Blind Number Challenge game."
website = "https://nums.gg"

[namespace]
default = "NUMS"

[env]
rpc_url = "https://api.cartridge.gg/x/starknet/sepolia"
# world_address = "0x019d44cee87d8266ea7e026e44c8b5031449cb4ffd2fec139e4c50054b00c333"
account_address = "0x059b1a0c489b635d7c7f43594d187362ddd2dcea6c82db4eef2579fd185b3753"
keystore_path = "./keystore_sepolia.json"

[migration]
order_inits = [
  "NUMS-Token",
  "NUMS-Setup",
  "NUMS-Play",
  "NUMS-Collection",
  "NUMS-Vault",
  "NUMS-Faucet",
]
skip_contracts = ["NUMS-Vrf", "NUMS-Registry"]
disable_multicall = true

[writers]
"NUMS" = ["NUMS-Setup", "NUMS-Play"]

[owners]
"NUMS" = ["NUMS-Collection", "NUMS-Vault", "NUMS-Faucet", "NUMS-Token"]

[init_call_args]
"NUMS-Vault" = [
  "0x1", # open: true
  "0x0", # fee: 500 basis points (10000 basis points = 100%)
]
